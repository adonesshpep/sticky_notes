services:
  - type: web
    name: your-app-name
    env: php
    buildCommand: composer install --optimize-autoloader --no-dev && php artisan config:cache && php artisan route:cache
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true